<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klaus163 | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200 font-sans min-h-screen">
    <header class="py-16 flex flex-col items-center">
        <div class="w-20 h-20 bg-emerald-500 rounded-[2rem] flex items-center justify-center mb-6 shadow-2xl shadow-emerald-500/40 border border-emerald-300">
            <i class="fa-solid fa-terminal text-3xl text-slate-900"></i>
        </div>
        <h1 class="text-3xl font-black tracking-tighter uppercase italic">klaus163</h1>
        <div class="h-1 w-12 bg-emerald-500 mt-2"></div>
    </header>

    <main class="max-w-md mx-auto p-6">
        <div class="bg-slate-900/90 border border-slate-800 rounded-[2rem] p-8 shadow-2xl backdrop-blur-md">
            <div class="flex items-center justify-between mb-8">
                <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500">System Link</span>
                <div id="dot" class="h-2 w-2 rounded-full bg-emerald-500 shadow-[0_0_15px_#10b981]"></div>
            </div>
            
            <div class="space-y-8">
                <div>
                    <label class="text-[9px] text-slate-500 uppercase font-black mb-1 block">Network Gateway</label>
                    <div id="ip-address" class="text-3xl font-mono font-light tracking-tighter">Connecting...</div>
                </div>
                <div>
                    <label class="text-[9px] text-slate-500 uppercase font-black mb-1 block">Geo-Location</label>
                    <div id="location" class="text-sm text-emerald-400 font-medium">Scanning Node...</div>
                </div>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-2 gap-4">
            <div class="p-4 bg-slate-900/50 border border-slate-800 rounded-2xl text-center">
                <div class="text-[10px] text-slate-500 uppercase mb-1">Status</div>
                <div class="text-xs font-bold text-emerald-500">Active</div>
            </div>
            <div class="p-4 bg-slate-900/50 border border-slate-800 rounded-2xl text-center">
                <div class="text-[10px] text-slate-500 uppercase mb-1">Mode</div>
                <div class="text-xs font-bold text-emerald-500">P2P Legion</div>
            </div>
        </div>
    </main>

    <script>
        async function fetchNet() {
            const providers = [
                { url: 'https://ipwho.is/', ip: 'ip', loc: (d) => `${d.city}, ${d.country}` },
                { url: 'https://ipapi.co/json/', ip: 'ip', loc: (d) => `${d.city}, ${d.country_name}` },
                { url: 'https://api.ipify.org?format=json', ip: 'ip', loc: () => 'Protected Node' }
            ];

            for (let p of providers) {
                try {
                    const r = await fetch(p.url);
                    const d = await r.json();
                    if (d.ip || d.query) {
                        document.getElementById('ip-address').innerText = d.ip || d.query;
                        document.getElementById('location').innerText = p.loc(d);
                        return;
                    }
                } catch (e) { console.log('Bypass...'); }
            }
            document.getElementById('ip-address').innerText = 'Shield Active';
        }
        fetchNet();
    </script>
</body>
</html>
