<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klaus163 | Secure Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200 font-sans min-h-screen flex flex-col">
    <header class="py-16 flex flex-col items-center">
        <div class="w-24 h-24 bg-emerald-500 rounded-3xl rotate-12 flex items-center justify-center mb-6 shadow-2xl shadow-emerald-500/20 border-2 border-emerald-400">
            <i class="fa-solid fa-shield-halved text-4xl text-slate-900 -rotate-12"></i>
        </div>
        <h1 class="text-4xl font-black tracking-tighter uppercase">klaus163</h1>
        <p class="text-emerald-500 font-mono text-xs mt-2 tracking-[0.3em]">SYSTEM ORCHESTRATOR</p>
    </header>

    <main class="flex-grow max-w-lg mx-auto w-full p-6">
        <div class="bg-slate-900/80 border border-slate-800 rounded-[2.5rem] p-8 backdrop-blur-xl shadow-2xl">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Network Info</h2>
                <div id="status-badge" class="h-2 w-2 rounded-full bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)] animate-ping"></div>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold block mb-2">Public Address</label>
                    <div id="ip-address" class="text-2xl font-mono text-slate-100 tracking-tight">Checking...</div>
                </div>
                <div class="h-px bg-slate-800 w-full"></div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold block mb-2">Current Location</label>
                    <div id="location" class="text-lg text-emerald-400 font-medium italic">Scanning satellites...</div>
                </div>
            </div>
        </div>
        
        <button onclick="window.location.reload(true)" class="w-full mt-8 py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl text-xs font-bold uppercase tracking-widest transition-all">
            Обновить данные
        </button>
    </main>

    <footer class="p-8 text-center text-[10px] text-slate-600 uppercase tracking-widest">
        Node: klaus163.github.io | v6.3 LEGION
    </footer>

    <script>
        async function getIP() {
            const apis = [
                'https://ipapi.co/json/',
                'https://ipwho.is/',
                'https://api.ipify.org?format=json'
            ];
            
            for (let api of apis) {
                try {
                    const res = await fetch(api);
                    const data = await res.json();
                    
                    document.getElementById('ip-address').innerText = data.ip || data.query;
                    document.getElementById('location').innerText = data.city ? `${data.city}, ${data.country || data.country_name}` : 'VPN Active (Location Hidden)';
                    
                    const badge = document.getElementById('status-badge');
                    badge.classList.remove('bg-amber-500', 'animate-ping');
                    badge.classList.add('bg-emerald-500', 'shadow-[0_0_10px_rgba(16,185,129,0.5)]');
                    return;
                } catch (e) { console.log('Sensor bypass...'); }
            }
            document.getElementById('status-badge').innerText = 'Sensor Fail';
        }
        getIP();
    </script>
</body>
</html>
